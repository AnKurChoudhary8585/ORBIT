<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBIT - Premium Video Platform</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo-container" style="display: flex; flex-direction: column; align-items: flex-start;">
            <div class="logo">ORBIT</div>
            <span style="font-size: 0.8rem; color: var(--text-muted); letter-spacing: 1px; margin-top: -2px;">Crafted By Ankur</span>
        </div>
        <div class="nav-links">
            <button id="auth-btn" class="btn primary">Login</button>
            <button id="upload-btn" class="btn secondary hidden">Upload</button>
            
            <div id="user-menu-container" class="hidden" style="position: relative;">
                <img id="nav-avatar" src="" alt="Profile" style="width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 2px solid var(--primary); object-fit: cover; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                
                <div id="profile-panel" class="hidden glass" style="position: absolute; top: 55px; right: 0; width: 260px; border-radius: 16px; padding: 1.5rem; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); z-index: 100; backdrop-filter: blur(20px); transition: opacity 0.3s, transform 0.3s; transform-origin: top right;">
                    <div style="position: relative; display: inline-block; cursor: pointer; margin-bottom: 0.5rem;" onclick="document.getElementById('avatar-upload').click()">
                        <img id="panel-avatar" src="" alt="Profile" style="width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; transition: opacity 0.3s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">
                        <div style="position: absolute; bottom: 0px; right: 0px; background: var(--primary); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 2px solid #000; color: #fff;">📷</div>
                    </div>
                    <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
                    
                    <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 0.2rem;">
                        <h3 id="panel-name" style="margin: 0; font-size: 1.2rem; color: #fff;"></h3>
                        <span id="edit-name-btn" title="Change Name" style="cursor: pointer; font-size: 0.9rem; color: var(--primary); opacity: 0.8; transition: opacity 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">✎</span>
                    </div>
                    <p id="panel-username" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;"></p>
                    
                    <div style="margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--glass-border);">
                        <div>
                            <strong id="panel-subscribers" style="display: block; font-size: 1.4rem; color: var(--primary);">0</strong>
                            <span style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Subscribers</span>
                        </div>
                    </div>
                    
                    <button id="logout-btn" class="btn danger" style="width: 100%; border-radius: 8px;">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <header class="hero">
            <h1>Discover the Universe of Content</h1>
            <p>Your premium gateway to limitless videos.</p>
        </header>

        <section id="video-feed" class="video-grid">
            <div class="loading" style="text-align:center; width: 100%; color: var(--text-muted);">Loading videos...</div>
        </section>
    </main>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal hidden">
        <div class="modal-content glass">
            <span class="close">&times;</span>
            <h2 id="auth-title">Login to ORBIT</h2>
            <form id="auth-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="email" id="email" placeholder="Email (for registration)" class="hidden">
                <input type="text" id="fullname" placeholder="Full Name (for registration)" class="hidden">
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn primary">Submit</button>
            </form>
            <p class="toggle-auth">Don't have an account? <span id="toggle-auth-btn">Register</span></p>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal" class="modal hidden">
        <div class="modal-content glass">
            <span class="close-upload">&times;</span>
            <h2>Upload Video</h2>
            <form id="upload-form">
                <input type="text" id="video-title" placeholder="Video Title" required>
                <textarea id="video-desc" placeholder="Description" required></textarea>
                <label>Video File</label>
                <input type="file" id="video-file" accept="video/*" required>
                <label>Thumbnail</label>
                <input type="file" id="thumbnail-file" accept="image/*" required>
                <button type="submit" class="btn primary">Upload</button>
            </form>
        </div>
    </div>

    <!-- Watch Modal -->
    <div id="watch-modal" class="modal hidden">
        <div class="modal-content glass" style="max-width: 800px; padding: 2rem;">
            <span class="close-watch" style="top: 1rem; right: 1.5rem; position: absolute; font-size: 1.8rem; cursor: pointer; color: var(--text-muted);">&times;</span>
            
            <video id="watch-video-player" controls style="width: 100%; border-radius: 12px; margin-bottom: 1rem; background: black; max-height: 60vh;"></video>
            
            <h2 id="watch-video-title" style="margin-bottom: 0.5rem; text-align: left; font-size: 1.5rem;">Video Title</h2>
            
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;">
                <p id="watch-video-meta" style="color: var(--text-muted); font-size: 0.95rem; max-width: 70%;">Description here</p>
                
                <div style="display: flex; gap: 1rem;">
                    <button id="like-btn" class="btn secondary">👍 Like</button>
                    <button id="subscribe-btn" class="btn primary">Subscribe</button>
                </div>
            </div>
            
            <div style="text-align: left; color: var(--text-muted); font-size: 0.9rem;">
                Comments section coming soon...
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
